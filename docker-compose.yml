services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 64M

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: medical_mvp
    volumes:
      - pgdata:/var/lib/postgresql/data
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=128MB"
      - "-c"
      - "effective_cache_size=384MB"
      - "-c"
      - "work_mem=2MB"
      - "-c"
      - "maintenance_work_mem=32MB"
      - "-c"
      - "max_connections=30"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 384M
        reservations:
          memory: 192M

  backup:
    image: postgres:16
    restart: unless-stopped
    volumes:
      - ./backups:/backups
    environment:
      PGPASSWORD: ${DB_PASSWORD}
      BACKUP_PASSPHRASE: ${BACKUP_PASSPHRASE:?Set BACKUP_PASSPHRASE for encrypted backups}
    entrypoint: |
      sh -c 'while true; do
        TIMESTAMP=$$(date +%Y%m%d_%H%M%S)
        BACKUP_FILE="/backups/medical_mvp_$$TIMESTAMP.gz.gpg"
        pg_dump -h db -U postgres medical_mvp | gzip | gpg --batch --yes --passphrase "$$BACKUP_PASSPHRASE" --symmetric --cipher-algo AES256 -o "$$BACKUP_FILE"
        BACKUP_SIZE=$$(stat -c%s "$$BACKUP_FILE" 2>/dev/null || echo 0)
        if [ "$$BACKUP_SIZE" -lt 1024 ]; then
          echo "[$$TIMESTAMP] WARNING: Backup may be empty ($$BACKUP_SIZE bytes)"
        else
          echo "[$$TIMESTAMP] Backup completed and encrypted ($$BACKUP_SIZE bytes)"
        fi
        # Retention: keep all backups (5-year legal requirement)
        # Safety valve: if /backups exceeds 10 GB, remove oldest until under limit
        while [ "$$(du -sb /backups 2>/dev/null | cut -f1)" -gt 10737418240 ]; do
          OLDEST=$$(ls -t /backups/medical_mvp_*.gpg 2>/dev/null | tail -1)
          if [ -z "$$OLDEST" ]; then break; fi
          echo "[$$TIMESTAMP] WARNING: /backups exceeds 10 GB, removing $$OLDEST"
          rm -f "$$OLDEST"
        done
        sleep 14400
      done'
    depends_on:
      db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 64M

  backend:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      DATABASE_URL: postgresql+asyncpg://postgres:${DB_PASSWORD}@db:5432/medical_mvp
      CORS_ORIGINS: https://${DOMAIN}
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 384M
        reservations:
          memory: 192M

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: https://${DOMAIN}/api
    restart: unless-stopped
    depends_on:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000/').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 192M
        reservations:
          memory: 96M

volumes:
  pgdata:
  caddy_data:
  caddy_config:
